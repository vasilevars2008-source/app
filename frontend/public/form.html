<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Записаться — ArtJoga</title>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
  </script>
  <script type="text/javascript">
    (function() {
      emailjs.init("FfwQq2QSyhR8qXcwk");
    })();
  </script>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f8f6f1;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .form-container {
      background: white;
      padding: 40px;
      border-radius: 30px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      border: 1px solid #e8e3d8;
    }
    h2 {
      font-family: serif;
      font-size: 28px;
      margin-top: 0;
      color: #1e1e1e;
    }
    label {
      display: block;
      margin-top: 20px;
      font-weight: 500;
      font-size: 14px;
      color: #1e1e1e;
    }
    input, textarea {
      width: 100%;
      padding: 12px 16px;
      margin-top: 6px;
      border: 1px solid #ddd6c8;
      border-radius: 16px;
      font-size: 16px;
      background: #fcfaf7;
      box-sizing: border-box;
    }
    button {
      margin-top: 28px;
      width: 100%;
      background: #1e1e1e;
      color: white;
      border: none;
      padding: 16px;
      border-radius: 40px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #b87c5a;
    }
    .status {
      margin-top: 16px;
      font-size: 15px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>✧ Записаться</h2>
    <form id="contact-form">
      <label>Имя</label>
      <input type="text" name="name" required>

      <label>Телефон</label>
      <input type="text" name="phone" required>

      <label>Email</label>
      <input type="email" name="email" required>

      <label>Сообщение</label>
      <textarea name="message" rows="4"></textarea>

      <button type="submit">Записаться</button>
      <div id="status" class="status"></div>
    </form>
  </div>

  <script>
    document.getElementById('contact-form').addEventListener('submit', function(event) {
      event.preventDefault();

      const status = document.getElementById('status');
      status.textContent = "Отправка...";
      status.style.color = "#b87c5a";

      emailjs.sendForm('service_pz1r1qn', 'template_n7w7mqz', this)
        .then(function() {
          status.textContent = "✅ Заявка отправлена! Мы свяжемся с вами.";
          status.style.color = "#2b7a4b";
          document.getElementById('contact-form').reset();
        }, function(error) {
          status.textContent = "❌ Ошибка отправки. Попробуйте позже.";
          status.style.color = "#b33";
          console.error('Ошибка:', error);
        });
    });
  </script>
</body>
</html>
